services:
  # Backend Service
  - type: web
    name: lucky-snap-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: 22.19.0
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      # Almacenamiento local de imágenes en un Volume persistente.
      # En Railway/Render, montar un disco en /data y setear esta ruta.
      - key: IMAGE_STORAGE_PATH
        value: /data/uploads
      # URL pública del backend (para construir las URLs absolutas de las imágenes).
      - key: PUBLIC_BASE_URL
        sync: false

  # Frontend Service
  - type: static
    name: lucky-snap-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://lucky-snap-backend-complete.onrender.com/api
        
